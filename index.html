<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Predio La Cruz</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#070a09">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
--bg-primary:#070a09; --bg-secondary:#0d1411; --bg-card:#141d19;
--accent-emerald:#10b981; --accent-cyan:#06b6d4; --accent-red:#ef4444;
--text-primary:#f0fdf4; --text-secondary:#a7f3d0; --text-muted:#6b7280;
--border-color:rgba(16,185,129,0.12); --field-green:#166534;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;}

/* ===== INTRO PRO ===== */
#intro{
position:fixed;
inset:0;
background:#070a09;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOutIntro 0.6s ease 5s forwards;
}

.logo-container{
position:relative;
width:70vw;
max-width:320px;
animation:zoomIntro 1.2s ease forwards;
}

.intro-logo{
width:100%;
border-radius:50%;
filter:blur(10px);
opacity:0;
animation:
focusIntro 1s ease forwards 0.3s,
glowIntro 1.5s ease 2.5s,
pulseIntro 2s infinite 3s;
}

/* HUD */
.hud{
position:absolute;
inset:-20px;
border:1px solid rgba(6,182,212,0.2);
border-radius:50%;
animation:hudRotate 6s linear infinite;
}

/* SCAN */
.scan{
position:absolute;
top:0;
left:-100%;
width:100%;
height:3px;
background:linear-gradient(90deg,transparent,rgba(6,182,212,0.2),var(--accent-cyan),rgba(6,182,212,0.2),transparent);
filter:blur(1px);
animation:scanIntro 1.5s ease 1.5s;
}

/* TEXTO */
.loading-text{
position:absolute;
bottom:-60px;
font-size:0.7rem;
letter-spacing:3px;
color:var(--accent-cyan);
opacity:0;
animation:fadeText 1s ease 2s forwards, blink 1.5s infinite 3s;
}

/* ANIMACIONES */
@keyframes focusIntro{to{filter:blur(0);opacity:1;}}
@keyframes zoomIntro{from{transform:scale(0.8);}to{transform:scale(1);}}
@keyframes scanIntro{
0%{top:20%;left:-100%;}
50%{left:100%;}
100%{top:80%;left:100%;}
}
@keyframes glowIntro{
0%{filter:drop-shadow(0 0 0 var(--accent-cyan));}
50%{filter:drop-shadow(0 0 25px var(--accent-cyan));}
100%{filter:drop-shadow(0 0 5px var(--accent-cyan));}
}
@keyframes pulseIntro{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}
@keyframes hudRotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
@keyframes fadeText{to{opacity:1;}}
@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}
@keyframes fadeOutIntro{
to{opacity:0;visibility:hidden;}
}

/* ===== TU UI (igual) ===== */
.menu-toggle{position:fixed;top:20px;left:20px;z-index:1100;background:var(--accent-emerald);color:#000;border:none;width:50px;height:50px;border-radius:15px;cursor:pointer;font-size:1.5rem;}
.side-menu{position:fixed;top:0;left:-300px;width:280px;height:100vh;background:var(--bg-secondary);z-index:1050;transition:left 0.3s;padding-top:80px;}
.side-menu.open{left:0;}
.overlay{position:fixed;display:none;inset:0;background:rgba(0,0,0,0.8);z-index:1040;}
.menu-item{padding:18px 24px;border-bottom:1px solid var(--border-color);cursor:pointer;}

.page{display:none;}
.page.active{display:block;}

.logo-img{width:140px;height:140px;border-radius:50%;margin-bottom:20px;}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="logo-container">
    <div class="hud"></div>
    <img src="icon.png" class="intro-logo">
    <div class="scan"></div>
    <div class="loading-text">INICIANDO SISTEMA...</div>
  </div>
</div>

<button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="side-menu" id="menu">
<div class="menu-item" onclick="showPage('home')">Inicio</div>
<div class="menu-item" onclick="showPage('estado')">Estado</div>
</nav>

<div id="page-home" class="page active">
<img src="icon.png" class="logo-img">
<h1>Predio La Cruz</h1>
</div>

<script>
// INTRO SOLO UNA VEZ
const yaVisto = localStorage.getItem("intro_visto");

if (yaVisto) {
  document.getElementById("intro").remove();
} else {
  window.addEventListener("load", () => {
    setTimeout(() => {
      const intro = document.getElementById("intro");
      if (intro) intro.remove();
      localStorage.setItem("intro_visto", "true");
    }, 5000);
  });
}

// MENU
function toggleMenu(){
document.getElementById('menu').classList.toggle('open');
document.getElementById('overlay').style.display=
document.getElementById('menu').classList.contains('open')?'block':'none';
}

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('page-'+id).classList.add('active');
}
</script>

</body>
</html>
