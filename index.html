<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predio La Cruz - Gestion de Canchas</title>
    
    <!-- CONFIGURACION PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #070a09;
            --bg-secondary: #0d1411;
            --bg-tertiary: #111916;
            --bg-card: #141d19;
            --bg-card-hover: #1a2822;
            --accent-emerald: #10b981;
            --accent-emerald-light: #34d399;
            --accent-emerald-dark: #059669;
            --accent-amber: #f59e0b;
            --accent-amber-light: #fbbf24;
            --accent-red: #ef4444;
            --accent-red-light: #f87171;
            --accent-cyan: #06b6d4;
            --accent-cyan-light: #22d3ee;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --text-primary: #f0fdf4;
            --text-secondary: #a7f3d0;
            --text-muted: #6b7280;
            --border-color: rgba(16, 185, 129, 0.12);
            --field-green: #166534;
            --field-green-dark: #14532d;
            --status-optimal: #10b981;
            --status-warning: #f59e0b;
            --status-critical: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Animated Background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .mesh-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: mesh-float 25s ease-in-out infinite;
        }

        .mesh-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.4) 0%, transparent 70%);
            top: -100px;
            left: -100px;
        }

        .mesh-blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.3) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            animation-delay: -8s;
        }

        .mesh-blob:nth-child(3) {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(22, 101, 52, 0.5) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            animation-delay: -16s;
        }

        @keyframes mesh-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
        }

        /* Particles */
        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--accent-emerald);
            border-radius: 50%;
            opacity: 0;
            animation: particle-rise 18s linear infinite;
        }

        @keyframes particle-rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-50px) scale(1); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, var(--accent-emerald), var(--accent-emerald-dark)); 
            border-radius: 3px; 
        }

        .menu-toggle {
            position: fixed; 
            top: 20px; 
            left: 20px; 
            z-index: 1100;
            background: linear-gradient(135deg, var(--accent-emerald), var(--accent-emerald-dark));
            color: var(--bg-primary); 
            border: none;
            width: 56px; 
            height: 56px; 
            border-radius: 18px; 
            cursor: pointer; 
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle:hover { 
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 50px rgba(16, 185, 129, 0.4);
        }
        .menu-toggle:active { transform: scale(0.95); }

        .side-menu {
            position: fixed; 
            top: 0; 
            left: -320px; 
            width: 300px; 
            height: 100vh;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            z-index: 1050; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 100px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }
        .side-menu.open { left: 0; }
        
        .menu-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 28px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), transparent);
        }
        .menu-header h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--text-primary);
        }

        .menu-item { 
            padding: 18px 28px; 
            color: var(--text-secondary); 
            text-decoration: none; 
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 500; 
            border-bottom: 1px solid var(--border-color); 
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            position: relative;
            overflow: hidden;
        }
        .menu-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: linear-gradient(90deg, var(--accent-emerald), transparent);
            transition: width 0.4s ease;
            opacity: 0.3;
        }
        .menu-item .icon {
            font-size: 1.4rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: 12px;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }
        .menu-item:hover .icon {
            background: var(--accent-emerald);
            transform: scale(1.1);
        }
        .menu-item:hover::before { width: 100%; }
        .menu-item:hover { padding-left: 36px; color: var(--text-primary); }

        .overlay { 
            position: fixed; 
            display: none; 
            inset: 0;
            background: rgba(0,0,0,0.85); 
            z-index: 1040; 
            backdrop-filter: blur(12px);
        }

        .page { 
            display: none; 
            min-height: 100vh; 
            position: relative;
            z-index: 2;
        }
        .page.active { display: block; }
        .page-content { animation: pageSlide 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pageSlide { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* HOME */
        #page-home { 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 28px;
            position: relative;
            overflow: hidden;
        }
        .home-decoration {
            position: absolute;
            width: 450px;
            height: 450px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            animation: rotate-slow 60s linear infinite;
        }
        .home-decoration:nth-child(2) { width: 550px; height: 550px; animation-direction: reverse; animation-duration: 75s; }
        .home-decoration:nth-child(3) { width: 350px; height: 350px; animation-duration: 45s; }
        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .logo-container { position: relative; z-index: 1; margin-bottom: 28px; }
        .logo-ring {
            position: absolute;
            inset: -15px;
            border: 2px solid var(--accent-emerald);
            border-radius: 50%;
            animation: pulse-ring 3s ease-in-out infinite;
        }
        .logo-ring:nth-child(2) { inset: -25px; animation-delay: 0.5s; opacity: 0.5; }
        @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 1; } }
        
        .logo-img { 
            width: 140px; height: 140px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 0 4px var(--accent-emerald), 0 0 70px rgba(16, 185, 129, 0.25), 0 25px 50px rgba(0,0,0,0.4);
            animation: logo-float 6s ease-in-out infinite;
            background: var(--bg-tertiary);
            position: relative;
            z-index: 1;
        }
        @keyframes logo-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 33% { transform: translateY(-12px) rotate(1deg); } 66% { transform: translateY(-6px) rotate(-1deg); } }
        
        .home-title { 
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem; font-weight: 400; margin-bottom: 6px; 
            text-transform: uppercase; letter-spacing: 8px;
            position: relative; z-index: 1;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-emerald-light) 50%, var(--text-primary) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: text-shimmer 4s linear infinite;
        }
        @keyframes text-shimmer { to { background-position: 200% center; } }
        
        .home-subtitle {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 10px; text-transform: uppercase;
            color: var(--accent-emerald); margin-bottom: 22px; position: relative; z-index: 1;
        }
        .home-desc { 
            color: var(--text-muted); max-width: 400px; font-weight: 400; line-height: 1.9; 
            margin-bottom: 44px; font-size: 0.95rem; text-align: center; position: relative; z-index: 1;
        }

        .nav-buttons {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
            width: 100%; max-width: 420px; position: relative; z-index: 1;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            padding: 26px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }
        .nav-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--accent-emerald), transparent);
            opacity: 0; transition: opacity 0.4s;
        }
        .nav-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: left 0.6s;
        }
        .nav-btn:hover::after { left: 100%; }
        .nav-btn:hover::before { opacity: 0.08; }
        .nav-btn:hover { transform: translateY(-6px); box-shadow: 0 20px 45px rgba(16, 185, 129, 0.15); border-color: var(--accent-emerald); }
        .nav-btn:active { transform: scale(0.96); }
        .nav-btn .icon { font-size: 2.2rem; margin-bottom: 4px; position: relative; z-index: 1; transition: transform 0.3s; }
        .nav-btn:hover .icon { transform: scale(1.15); }
        .nav-btn .label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); position: relative; z-index: 1; transition: color 0.3s; }
        .nav-btn:hover .label { color: var(--text-primary); }
        .nav-btn.primary { grid-column: span 2; background: linear-gradient(135deg, var(--field-green-dark), var(--field-green)); border: none; }
        .nav-btn.primary .label { color: rgba(255,255,255,0.9); font-size: 0.75rem; }

        /* HEADER */
        header { 
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            padding: 24px 24px 24px 90px; 
            font-family: 'Bebas Neue', sans-serif;
            border-bottom: 3px solid var(--accent-emerald);
            position: sticky; top: 0; z-index: 100; 
            font-size: 1.4rem; font-weight: 400; letter-spacing: 4px; text-transform: uppercase;
            box-shadow: 0 12px 45px rgba(0,0,0,0.35);
            display: flex; align-items: center; gap: 14px;
        }
        header .header-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
        
        .container { padding: 24px; max-width: 1400px; margin: 0 auto; }
        
        .card { 
            background: var(--bg-card);
            border-radius: 24px; padding: 28px; margin-bottom: 24px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 45px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-emerald), transparent);
            opacity: 0; transition: opacity 0.4s;
        }
        .card:hover::before { opacity: 0.5; }
        .card h3 { color: var(--accent-emerald); margin-bottom: 22px; font-size: 0.8rem; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
        .card h3 .icon { font-size: 1.2rem; }

        /* DASHBOARD */
        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; margin-bottom: 28px; }
        .dashboard-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 4px; color: var(--text-primary); }
        .dashboard-subtitle { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

        .period-selector { display: flex; gap: 8px; background: var(--bg-tertiary); padding: 6px; border-radius: 16px; border: 1px solid var(--border-color); }
        .period-btn { padding: 10px 18px; border: none; background: transparent; color: var(--text-secondary); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .period-btn:hover { color: var(--text-primary); background: var(--bg-card); }
        .period-btn.active { background: var(--accent-emerald); color: var(--bg-primary); }

        .stats-overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
        .stat-card { background: linear-gradient(145deg, var(--bg-secondary), var(--bg-card)); border-radius: 18px; padding: 22px; border: 1px solid var(--border-color); position: relative; overflow: hidden; transition: all 0.3s ease; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--stat-color, var(--accent-emerald)); }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(0,0,0,0.2); }
        .stat-card.riegos { --stat-color: #06b6d4; }
        .stat-card.cortes { --stat-color: #f59e0b; }
        .stat-card.tareas { --stat-color: #8b5cf6; }
        .stat-card.alertas { --stat-color: #ef4444; }
        .stat-card .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .stat-card .stat-icon { font-size: 1.8rem; opacity: 0.8; }
        .stat-card .stat-trend { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        .stat-card .stat-trend.up { background: rgba(16, 185, 129, 0.15); color: var(--accent-emerald-light); }
        .stat-card .stat-trend.neutral { background: rgba(100, 116, 139, 0.15); color: var(--text-muted); }
        .stat-card .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 2px; color: var(--text-primary); line-height: 1; }
        .stat-card .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-top: 6px; }

        .fields-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
        .field-card { background: var(--bg-card); border-radius: 24px; overflow: hidden; border: 1px solid var(--border-color); transition: all 0.4s ease; }
        .field-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.25); border-color: rgba(16, 185, 129, 0.3); }
        .field-card-header { padding: 20px 24px; background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card)); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .field-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; }
        .field-status-badge { padding: 6px 14px; border-radius: 25px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        .field-status-badge.optimal { background: rgba(16, 185, 129, 0.12); color: var(--accent-emerald-light); border: 1px solid rgba(16, 185, 129, 0.25); }
        .field-status-badge.warning { background: rgba(245, 158, 11, 0.12); color: var(--accent-amber-light); border: 1px solid rgba(245, 158, 11, 0.25); }
        .field-status-badge.critical { background: rgba(239, 68, 68, 0.12); color: var(--accent-red); border: 1px solid rgba(239, 68, 68, 0.25); animation: pulse-badge 2s ease-in-out infinite; }
        @keyframes pulse-badge { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); } 50% { box-shadow: 0 0 15px 3px rgba(239, 68, 68, 0.15); } }
        .field-status-badge .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 1.5s ease-in-out infinite; }
